<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <title>MEGA CYBER PLATFORM PRO - ENTERPRISE V2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* نظام التصميم الموحد للمؤسسات - ENTERPRISE DESIGN SYSTEM */
        :root {
            --primary: #00E5FF;
            --secondary: #00B8D4;
            --accent: #00FF88;
            --bg-main: #050814;
            --bg-panel: rgba(11, 19, 36, 0.75);
            --bg-card: rgba(17, 24, 39, 0.85);
            --border-neon: rgba(0, 229, 255, 0.18);
            --border-neon-glow: 0 0 10px rgba(0, 229, 255, 0.2);
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --danger: #FF3131;
            --warning: #FFBB00;
            --success: #00FF88;
            --sidebar-width: 320px;
            --terminal-bg: #02040a;
        }

        [data-theme="light"] {
            --bg-main: #F4F7FC;
            --bg-panel: rgba(255, 255, 255, 0.9);
            --bg-card: #FFFFFF;
            --border-neon: rgba(0, 184, 212, 0.3);
            --text-main: #111827;
            --text-muted: #6B7280;
            --terminal-bg: #1F2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            background-image: 
                linear-gradient(var(--border-neon) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-neon) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* تخصيص شريط التمرير السيبراني */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        /* الشاشات التفاعلية وأدوات التحميل */
        #global-cyber-loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050814; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .matrix-spinner {
            width: 60px; height: 60px; border: 4px solid transparent;
            border-top-color: var(--primary); border-bottom-color: var(--accent);
            border-radius: 50%; animation: rotateMatrix 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        @keyframes rotateMatrix { to { transform: rotate(360deg); } }

        /* الهيكل الأساسي للتطبيق (App Wrapper) */
        #app-core-container { display: none; width: 100%; min-height: 100vh; display: flex; }

        /* شريط الملاحة الجانبي المطور متعدد المستويات */
        .cyber-sidebar {
            width: var(--sidebar-width); background: var(--bg-panel);
            border-left: 1px solid var(--border-neon); height: 100vh;
            position: fixed; right: 0; top: 0; z-index: 1000;
            display: flex; flex-direction: column; backdrop-filter: blur(20px);
            box-shadow: var(--border-neon-glow);
        }

        .sidebar-brand {
            padding: 25px 20px; border-bottom: 1px solid var(--border-neon);
            font-family: 'Share Tech Mono', sans-serif; font-size: 1.25rem;
            color: var(--primary); text-shadow: 0 0 8px var(--primary);
            display: flex; align-items: center; gap: 12px;
        }

        .sidebar-search-box { padding: 15px; border-bottom: 1px solid var(--border-neon); }
        .sidebar-search-box input {
            width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-neon); color: #FFF; border-radius: 4px; outline: none;
            font-size: 0.85rem;
        }

        .menu-container { flex: 1; overflow-y: auto; padding: 10px; }
        .suite-category {
            color: var(--text-muted); font-size: 0.75rem; font-weight: 700;
            padding: 12px 10px 6px 0; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }
        .suite-category:hover { color: var(--primary); }

        .suite-items-group { display: none; flex-direction: column; margin-bottom: 8px; }
        .suite-items-group.expanded { display: flex; }

        .nav-tool-link {
            display: flex; align-items: center; padding: 8px 12px; color: var(--text-main);
            text-decoration: none; border-radius: 4px; margin-bottom: 2px; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s;
        }
        .nav-tool-link i { width: 18px; margin-left: 8px; color: var(--primary); font-size: 0.9rem; }
        .nav-tool-link:hover, .nav-tool-link.active-tool {
            background: rgba(0, 229, 255, 0.08); color: #FFF; border-right: 3px solid var(--primary);
        }

        /* إطار محتوى العمليات الرئيسي */
        .workspace-frame { margin-right: var(--sidebar-width); flex: 1; padding: 30px; display: flex; flex-direction: column; }
        
        .workspace-header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-card); padding: 16px 24px; border-radius: 6px;
            border: 1px solid var(--border-neon); margin-bottom: 25px; box-shadow: var(--border-neon-glow);
        }
        .breadcrumb-nav { font-size: 0.9rem; color: var(--text-muted); display: flex; gap: 8px; align-items: center; }
        .breadcrumb-nav span.current { color: var(--primary); font-weight: 600; }

        /* مكونات البطاقات والواجهات السيبرانية */
        .enterprise-card {
            background: var(--bg-card); border: 1px solid var(--border-neon);
            border-radius: 8px; padding: 24px; margin-bottom: 25px;
            backdrop-filter: blur(12px); position: relative; overflow: hidden;
            box-shadow: var(--border-neon-glow);
        }
        .enterprise-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary);
        }
        .enterprise-card.danger-card::before { background: var(--danger); }
        .enterprise-card.success-card::before { background: var(--success); }

        .tool-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; color: #FFF; }
        [data-theme="light"] .tool-title { color: var(--text-main); }

        /* أدوات النمذجة الاستمارات والمحاكيات */
        .form-label { display: block; margin-bottom: 6px; font-size: 0.88rem; color: var(--text-muted); font-weight: 500; }
        .cyber-input {
            width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-neon); color: #FFF; border-radius: 6px;
            font-size: 0.95rem; outline: none; margin-bottom: 15px; font-family: 'Fira Code', monospace;
        }
        [data-theme="light"] .cyber-input { background: #FFF; color: #000; }
        .cyber-input:focus { border-color: var(--primary); box-shadow: 0 0 12px rgba(0, 229, 255, 0.3); }

        .btn-cyber-action {
            background: transparent; border: 1px solid var(--primary); color: var(--primary);
            padding: 10px 22px; font-weight: 600; border-radius: 4px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
            transition: all 0.3s; text-shadow: 0 0 5px var(--primary);
        }
        .btn-cyber-action:hover { background: var(--primary); color: #050814; box-shadow: 0 0 15px var(--primary); }

        /* مشغلات الكود ومخرجات التحليل (Terminals) */
        .cyber-terminal {
            background: var(--terminal-bg); border: 1px solid rgba(0, 229, 255, 0.15);
            font-family: 'Fira Code', 'Share Tech Mono', monospace; padding: 20px; border-radius: 6px;
            color: var(--accent); white-space: pre-wrap; margin-top: 15px; max-height: 450px; overflow-y: auto;
            font-size: 0.9rem; line-height: 1.5; direction: ltr; text-align: left;
        }

        /* التنسيقات الشبكية المتجاوبة */
        .cyber-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .cyber-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .cyber-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

        /* شاشات الأنظمة والمجموعات (Views Container) */
        .cyber-view-panel { display: none; animation: panelSlideIn 0.35s ease-out forwards; }
        .cyber-view-panel.active-view { display: block; }
        @keyframes panelSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* نظام التنبيهات المنبثقة الدائم */
        #cyber-toast-center { position: fixed; bottom: 20px; left: 20px; z-index: 11000; display: flex; flex-direction: column; gap: 10px; }
        .cyber-toast {
            background: var(--bg-card); border-right: 4px solid var(--primary); padding: 14px 24px;
            border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); color: var(--text-main);
            font-size: 0.9rem; font-weight: 500; min-width: 300px; display: flex; align-items: center; gap: 12px;
            animation: toastIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes toastIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

        // نظام الإشعارات الفوري الذكي
        const CyberNotify = {
            trigger(msg, type = 'info') {
                const center = document.getElementById('cyber-toast-center');
                const toast = document.createElement('div');
                toast.className = 'cyber-toast';
                if(type === 'danger') toast.style.borderRightColor = 'var(--danger)';
                if(type === 'success') toast.style.borderRightColor = 'var(--success)';
                if(type === 'warning') toast.style.borderRightColor = 'var(--warning)';
                
                toast.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> <span>${msg}</span>`;
                center.appendChild(toast);
                setTimeout(() => { toast.remove(); }, 4000);
            }
        };

        // محرك الملاحة والتوجيه الديناميكي الموحد (SPA Router)
        const CyberRouter = {
            currentTheme: 'dark',

            renderSidebar() {
                const anchor = document.getElementById('sidebarMenuAnchor');
                anchor.innerHTML = '';
                
                for (const [key, suite] of Object.entries(CyberSuitesDefinition)) {
                    const categoryEl = document.createElement('div');
                    categoryEl.className = 'suite-category';
                    categoryEl.innerHTML = `<span><i class="fa-solid ${suite.icon}"></i> ${suite.title}</span> <i class="fa-solid fa-chevron-down" style="font-size:0.7rem;"></i>`;
                    categoryEl.onclick = () => this.toggleCategory(key);
                    
                    const groupEl = document.createElement('div');
                    groupEl.id = `group-${key}`;
                    groupEl.className = 'suite-items-group';
                    
                    suite.tools.forEach(tool => {
                        const link = document.createElement('div');
                        link.className = 'nav-tool-link';
                        link.id = `nav-${tool.id}`;
                        link.innerHTML = `<i class="fa-solid fa-cube"></i> ${tool.title}`;
                        link.onclick = () => this.loadToolWorkspace(key, tool.id, tool.title);
                        groupEl.appendChild(link);
                    });
                    
                    anchor.appendChild(categoryEl);
                    anchor.appendChild(groupEl);
                }
            },

            toggleCategory(key) {
                const group = document.getElementById(`group-${key}`);
                group.classList.toggle('expanded');
            },

            filterTools() {
                const query = document.getElementById('globalToolSearch').value.toLowerCase();
                document.querySelectorAll('.nav-tool-link').forEach(link => {
                    if(link.textContent.toLowerCase().includes(query)) {
                        link.style.display = 'flex';
                        link.parentElement.classList.add('expanded');
                    } else {
                        link.style.display = 'none';
                    }
                });
            },

            toggleGlobalTheme() {
                this.currentTheme = this.currentTheme === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', this.currentTheme);
                CyberNotify.trigger(`تم تغيير مظهر الواجهة إلى النمط: ${this.currentTheme.toUpperCase()}`);
            },

            loadToolWorkspace(suiteKey, toolId, toolTitle) {
                document.querySelectorAll('.nav-tool-link').forEach(l => l.classList.remove('active-tool'));
                const activeNav = document.getElementById(`nav-${toolId}`);
                if(activeNav) activeNav.classList.add('active-tool');

                document.getElementById('parent-suite-breadcrumb').innerText = CyberSuitesDefinition[suiteKey].title;
                document.getElementById('current-tool-breadcrumb').innerText = toolTitle;

                // تحديث العرض وإخفاء الواجهات القديمة
                document.querySelectorAll('.cyber-view-panel').forEach(v => v.classList.remove('active-view'));
